name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: SPA fallback (Angular routing)
        run: cp dist/SAClientes/browser/index.html dist/SAClientes/browser/404.html

      - name: Custom domain CNAME
        run: echo "saclientes.devandvar.com" > dist/SAClientes/browser/CNAME

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/SAClientes/browser

      - uses: actions/deploy-pages@v4
        id: deployment
